<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f8f9fc">
<title>Тренажёр фаундера</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
:root {
  --bg:     #f8f9fc;
  --bg2:    #ffffff;
  --bg3:    #f1f3f8;
  --bg4:    #e8ebf2;
  --border: rgba(0,0,0,0.08);
  --border2:rgba(0,0,0,0.15);
  --tx:     #111827;
  --tx2:    #6b7280;
  --tx3:    #9ca3af;
  --acc:    #2563eb;
  --acc2:   #1d4ed8;
  --acc-bg: #eff6ff;
  --acc-lt: #dbeafe;
  --green:  #059669;
  --green-bg:#ecfdf5;
  --red:    #dc2626;
  --red-bg: #fef2f2;
  --amber:  #d97706;
  --amber-bg:#fffbeb;
  --purple: #7c3aed;
  --purple-bg:#f5f3ff;
  --blue:   #0284c7;
  --blue-bg:#f0f9ff;
  --font-h: system-ui, -apple-system, sans-serif;
  --font:   system-ui, -apple-system, sans-serif;
  --r:  14px;
  --r2: 10px;
  --r3: 8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:var(--font);overflow:hidden}

#app{display:flex;flex-direction:column;height:100vh;max-width:430px;margin:0 auto}
#screen{flex:1;overflow-y:auto;overflow-x:hidden}
#screen::-webkit-scrollbar{display:none}

#update-banner{display:none;position:fixed;top:0;left:50%;transform:translateX(-50%);background:var(--amber);color:#fff;font-size:13px;font-weight:600;padding:10px 20px;border-radius:0 0 var(--r2) var(--r2);z-index:999;cursor:pointer;max-width:430px;width:100%;text-align:center}

#nav{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--border);background:var(--bg2);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 12px;cursor:pointer;border:none;background:none;color:var(--tx3);font-family:var(--font);font-size:10px;transition:color 0.15s}
.nav-btn svg{width:22px;height:22px;stroke-width:1.8}
.nav-btn.active{color:var(--acc)}

/* HOME */
.home-header{padding:48px 20px 20px}
.home-brand{font-size:11px;font-weight:600;color:var(--acc);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:8px}
.home-title{font-size:24px;font-weight:700;color:var(--tx);line-height:1.2}
.home-title span{color:var(--acc)}
.home-sub{font-size:13px;color:var(--tx2);margin-top:8px;line-height:1.6}

.streak-row{margin:0 20px 20px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;display:flex;align-items:center;gap:14px}
.streak-icon{font-size:26px}
.streak-val{font-size:22px;font-weight:700;color:var(--tx)}
.streak-label{font-size:11px;color:var(--tx3);margin-top:1px}
.streak-bar{flex:1}
.xp-row{display:flex;justify-content:space-between;font-size:11px;color:var(--tx3);margin-bottom:5px}
.xp-track{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.xp-fill{height:100%;background:var(--acc);border-radius:2px;transition:width 0.5s ease}

.section-title{font-size:11px;font-weight:600;color:var(--tx3);letter-spacing:0.1em;text-transform:uppercase;padding:0 20px 10px}
.modules-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 20px 20px}
.module-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;cursor:pointer;transition:border-color 0.15s,box-shadow 0.15s;position:relative;overflow:hidden;-webkit-user-select:none;user-select:none}
.module-card:active{box-shadow:0 0 0 2px var(--acc-lt)}
.module-tag{font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:8px;padding:3px 8px;border-radius:20px;display:inline-block}
.tag-biz{background:var(--purple-bg);color:var(--purple)}
.tag-tech{background:var(--blue-bg);color:var(--blue)}
.module-icon{font-size:22px;margin-bottom:6px}
.module-name{font-size:13px;font-weight:600;color:var(--tx);line-height:1.3;margin-bottom:3px}
.module-desc{font-size:11px;color:var(--tx3);line-height:1.4}
.module-badge{position:absolute;top:10px;right:10px;font-size:10px;background:var(--green-bg);color:var(--green);padding:2px 7px;border-radius:20px;font-weight:600}
.module-badge.ai-req{background:var(--amber-bg);color:var(--amber)}

/* SCREEN HEADER */
.prac-header{padding:48px 20px 16px;display:flex;align-items:flex-start;gap:12px}
.back-btn{width:36px;height:36px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;margin-top:2px}
.back-btn svg{width:18px;height:18px;color:var(--tx2)}
.prac-title-block .module-tag{margin-bottom:4px}
.prac-title{font-size:17px;font-weight:700;color:var(--tx)}
.prac-subtitle{font-size:12px;color:var(--tx2);margin-top:3px}

/* CHAT */
.chat-wrap{display:flex;flex-direction:column;min-height:calc(100vh - 200px)}
.chat-area{padding:0 16px 16px;display:flex;flex-direction:column;gap:10px;flex:1}
.msg{max-width:85%;animation:fadeUp 0.25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.ai{align-self:flex-start}
.msg.user{align-self:flex-end}
.msg.system{align-self:center;max-width:92%}
.msg-bubble{padding:10px 14px;border-radius:var(--r);font-size:14px;line-height:1.6}
.msg.ai .msg-bubble{background:var(--bg2);border:1px solid var(--border);color:var(--tx);border-bottom-left-radius:4px}
.msg.user .msg-bubble{background:var(--acc);color:#fff;border-bottom-right-radius:4px}
.msg.system .msg-bubble{background:var(--green-bg);border:1px solid rgba(5,150,105,0.2);color:var(--green);font-size:12px;text-align:center}
.typing-dots{display:flex;gap:4px;padding:12px 14px}
.typing-dots span{width:6px;height:6px;background:var(--tx3);border-radius:50%;animation:blink 1.2s infinite}
.typing-dots span:nth-child(2){animation-delay:0.2s}
.typing-dots span:nth-child(3){animation-delay:0.4s}
@keyframes blink{0%,80%,100%{opacity:0.25}40%{opacity:1}}
.chat-input-row{padding:10px 16px;display:flex;gap:8px;border-top:1px solid var(--border);background:var(--bg2);flex-shrink:0}
.chat-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:9px 13px;color:var(--tx);font-family:var(--font);font-size:14px;resize:none;min-height:40px;max-height:110px;line-height:1.4}
.chat-input:focus{outline:none;border-color:var(--acc)}
.chat-input::placeholder{color:var(--tx3)}
.send-btn{width:40px;height:40px;border-radius:var(--r2);background:var(--acc);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity 0.15s}
.send-btn:disabled{opacity:0.35;cursor:default}
.send-btn svg{width:17px;height:17px;color:#fff}

/* CARDS */
.task-card{margin:0 16px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.task-label{font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px}
.task-text{font-size:14px;color:var(--tx);line-height:1.6}
.task-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.chip{font-size:11px;padding:3px 9px;border-radius:20px;background:var(--bg3);border:1px solid var(--border);color:var(--tx2)}

/* SCENARIO */
.scenario-card{margin:0 16px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.scenario-avatar{width:46px;height:46px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:10px;border:1px solid var(--border)}
.scenario-name{font-size:14px;font-weight:600;color:var(--tx)}
.scenario-role{font-size:12px;color:var(--tx3);margin-top:1px}
.scenario-goal{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);font-size:12px;color:var(--tx2);line-height:1.6}
.score-row{display:flex;gap:8px;margin-top:12px}
.score-chip{flex:1;background:var(--bg3);border-radius:var(--r3);padding:8px;text-align:center;border:1px solid var(--border)}
.score-chip-val{font-size:15px;font-weight:700;color:var(--tx)}
.score-chip-label{font-size:9px;color:var(--tx3);margin-top:2px;text-transform:uppercase;letter-spacing:0.05em}

/* SQL */
.level-row{display:flex;gap:6px;padding:0 16px 14px;overflow-x:auto}
.level-row::-webkit-scrollbar{display:none}
.level-pill{flex-shrink:0;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--bg2);color:var(--tx2);transition:all 0.15s}
.level-pill.active{background:var(--acc);border-color:var(--acc);color:#fff}
.level-pill.done{background:var(--green-bg);border-color:rgba(5,150,105,0.25);color:var(--green)}
.sql-task{padding:0 16px}
.sql-label{font-size:10px;font-weight:600;color:var(--blue);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px}
.sql-context{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:13px;font-size:13px;color:var(--tx);line-height:1.6;margin-bottom:10px;white-space:pre-wrap}
.sql-code{background:#1e1e2e;border:1px solid var(--border);border-radius:var(--r2);padding:13px;font-family:'Courier New',monospace;font-size:12px;color:#cdd6f4;line-height:1.7;white-space:pre-wrap;word-break:break-all;margin-bottom:10px}
.sql-editor{width:100%;background:#1e1e2e;border:1.5px solid var(--border);border-radius:var(--r2);padding:13px;font-family:'Courier New',monospace;font-size:13px;color:#cdd6f4;line-height:1.7;min-height:90px;resize:vertical;margin-bottom:10px}
.sql-editor:focus{outline:none;border-color:var(--acc)}
.sql-editor::placeholder{color:#6c7086;font-family:var(--font);font-size:12px}
.result-block{margin-top:10px;padding:11px 13px;border-radius:var(--r2);font-size:13px;line-height:1.6}
.result-ok{background:var(--green-bg);border:1px solid rgba(5,150,105,0.25);color:var(--green)}
.result-err{background:var(--red-bg);border:1px solid rgba(220,38,38,0.25);color:var(--red)}

/* BTN */
.btn-row{display:flex;gap:8px}
.btn-primary{flex:1;background:var(--acc);color:#fff;border:none;border-radius:var(--r2);padding:12px;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;transition:opacity 0.15s}
.btn-primary:disabled{opacity:0.4;cursor:default}
.btn-secondary{background:var(--bg2);color:var(--tx2);border:1px solid var(--border);border-radius:var(--r2);padding:12px 14px;font-family:var(--font);font-size:13px;cursor:pointer}

/* CODE REVIEW */
.code-snippet{background:#1e1e2e;border:1px solid var(--border);border-radius:var(--r2);padding:15px;margin:0 16px 12px;font-family:'Courier New',monospace;font-size:12px;line-height:1.8;color:#cdd6f4;overflow-x:auto;white-space:pre}
.bug-hunt{padding:0 16px 12px}
.bug-item{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r2);padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:border-color 0.15s,background 0.15s}
.bug-item.sel{border-color:var(--acc);background:var(--acc-bg)}
.bug-item.correct{border-color:var(--green);background:var(--green-bg)}
.bug-item.wrong{border-color:var(--red);background:var(--red-bg)}
.bug-item.missed{border-color:var(--amber);background:var(--amber-bg)}
.bug-q{font-size:13px;color:var(--tx);line-height:1.4}
.bug-exp{font-size:11px;color:var(--tx2);margin-top:4px;line-height:1.5;display:none}

/* REVIEW OPTIONS */
.review-context{margin:0 16px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:15px;font-size:14px;color:var(--tx);line-height:1.6}
.review-options{padding:0 16px 12px}
.review-opt{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r2);padding:12px 14px;margin-bottom:8px;cursor:pointer;font-size:13px;color:var(--tx);line-height:1.4;transition:all 0.15s}
.review-opt:active{background:var(--bg3)}
.review-opt.correct{border-color:var(--green);background:var(--green-bg);color:var(--green)}
.review-opt.wrong{border-color:var(--red);background:var(--red-bg);color:var(--red)}
.review-explain{margin:0 16px 12px;background:var(--blue-bg);border:1px solid rgba(2,132,199,0.2);border-radius:var(--r2);padding:13px;font-size:13px;color:var(--tx2);line-height:1.6}

/* STATS */
.stats-screen{padding:48px 20px 24px}
.stats-title{font-size:20px;font-weight:700;margin-bottom:20px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:15px}
.stat-val{font-size:24px;font-weight:700;color:var(--acc)}
.stat-label{font-size:11px;color:var(--tx3);margin-top:3px}
.history-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:11px 14px;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center}
.hist-name{font-size:13px;color:var(--tx)}
.hist-score{font-size:12px;font-weight:600;color:var(--green)}

/* ECON INPUTS */
.econ-input{width:100%;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r2);padding:10px 13px;color:var(--tx);font-size:14px;font-family:var(--font)}
.econ-input:focus{outline:none;border-color:var(--acc)}

/* GIT */
.git-step{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r2);padding:11px 14px;margin-bottom:8px;cursor:pointer;font-family:'Courier New',monospace;font-size:12px;color:var(--tx);transition:all 0.15s;line-height:1.5}
.git-step.sel{border-color:var(--acc);background:var(--acc-bg);color:var(--acc2)}
.git-step.correct{border-color:var(--green);background:var(--green-bg)}
.git-step.wrong{border-color:var(--red);background:var(--red-bg)}

/* TOAST */
#toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--tx);color:var(--bg);font-size:12px;padding:8px 18px;border-radius:100px;opacity:0;transition:all 0.25s;pointer-events:none;white-space:nowrap;z-index:200}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* NO API MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:300;display:flex;align-items:flex-end;justify-content:center;padding:0}
.modal-box{background:var(--bg2);border-radius:var(--r) var(--r) 0 0;padding:24px 20px 36px;width:100%;max-width:430px;animation:slideUp 0.25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

.screen-in{animation:sIn 0.2s ease}
@keyframes sIn{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:translateX(0)}}
</style>
</head>
<body>
<div id="update-banner" onclick="location.reload()">🔄 Обновление — нажми для установки</div>
<div id="app">
  <div id="screen"></div>
  <nav id="nav">
    <button class="nav-btn" id="nav-home" onclick="navigate('home')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
      <span>Модули</span>
    </button>
    <button class="nav-btn" id="nav-practice" onclick="navigate('practice')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
      <span>Практика</span>
    </button>
    <button class="nav-btn" id="nav-stats" onclick="navigate('stats')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span>Прогресс</span>
    </button>
  </nav>
</div>
<div id="toast"></div>

<script>
// ─── CONFIG ───────────────────────────────────────────────
const API_KEY = 'YOUR_API_KEY';
const MODEL   = 'claude-sonnet-4-20250514';
function hasAPI(){ return API_KEY && API_KEY !== 'YOUR_API_KEY'; }

// ─── STATE ────────────────────────────────────────────────
let S = JSON.parse(localStorage.getItem('tf_v2') || '{}');
S.streak    = S.streak    || 0;
S.xp        = S.xp        || 0;
S.sqlDone   = S.sqlDone   || [];
S.reviewDone= S.reviewDone|| 0;
S.negotN    = S.negotN    || 0;
S.cdevN     = S.cdevN     || 0;
S.lastDate  = S.lastDate  || '';
function save(){ localStorage.setItem('tf_v2', JSON.stringify(S)); }

// streak check
(function(){
  const today = new Date().toDateString();
  if(S.lastDate !== today){
    const yest = new Date(Date.now()-86400000).toDateString();
    S.streak = (S.lastDate === yest) ? S.streak+1 : 1;
    S.lastDate = today;
    save();
  }
})();

// ─── NAVIGATION (history-based, fixes Android back) ───────
let currentPage = 'home';

function navigate(page, pushState=true){
  clearInterval(copyTimer);
  currentPage = page;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const navMap = {home:'nav-home', practice:'nav-practice', stats:'nav-stats',
                  negot:'nav-practice', cdev:'nav-practice', sql:'nav-practice',
                  review:'nav-practice', econ:'nav-practice', copy:'nav-practice',
                  arch:'nav-practice', git:'nav-practice'};
  const navId = navMap[page] || 'nav-home';
  document.getElementById(navId)?.classList.add('active');

  if(pushState) history.pushState({page}, '', '#'+page);

  const renders = {
    home: renderHome, stats: renderStats,
    negot: renderNegot, cdev: renderCdev,
    sql: renderSQL, review: renderReview,
    econ: renderEcon, copy: renderCopy,
    arch: renderArch, git: renderGit,
    practice: ()=> renderSQL()
  };
  (renders[page] || renders.home)();
  document.getElementById('screen').scrollTop = 0;
}

window.addEventListener('popstate', e => {
  clearInterval(copyTimer);
  const page = e.state?.page;
  if (!page) {
    // нет состояния — пушим home чтобы не выйти из приложения
    history.pushState({page:'home'}, '', '#home');
    navigate('home', false);
  } else {
    navigate(page, false);
  }
});

// initial history — два entry: один для перехвата, один рабочий
history.replaceState({page:'home'}, '', '#home');
history.pushState({page:'home'}, '', '#home');

// ─── TOAST ────────────────────────────────────────────────
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}
function addXP(n){ S.xp+=n; save(); toast('+'+n+' XP 🎯'); }

// ─── NO API MODAL ─────────────────────────────────────────
function showNoAPI(){
  const old = document.getElementById('no-api-m');
  if(old) old.remove();
  const m = document.createElement('div');
  m.id='no-api-m'; m.className='modal-overlay';
  m.innerHTML=`<div class="modal-box">
    <div style="font-size:30px;margin-bottom:12px">🔑</div>
    <div style="font-size:17px;font-weight:700;color:var(--tx);margin-bottom:8px">Нужен API ключ</div>
    <div style="font-size:13px;color:var(--tx2);line-height:1.6;margin-bottom:16px">
      Этот модуль работает через Claude AI.<br>Стоимость ~200₽/мес при ежедневном использовании.
    </div>
    <div style="background:var(--bg3);border-radius:var(--r2);padding:13px;margin-bottom:16px">
      <div style="font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px">Как получить</div>
      <div style="font-size:12px;color:var(--tx2);line-height:1.9">
        1. Открой <strong>console.anthropic.com</strong><br>
        2. API Keys → Create Key<br>
        3. В index.html найди строку:<br>
        <code style="background:var(--bg4);padding:2px 6px;border-radius:4px;font-size:11px">const API_KEY = 'YOUR_API_KEY'</code><br>
        4. Замени на свой ключ
      </div>
    </div>
    <div style="display:flex;gap:8px">
      <button onclick="document.getElementById('no-api-m').remove()" class="btn-secondary" style="flex:1">Закрыть</button>
      <button onclick="window.open('https://console.anthropic.com','_blank');document.getElementById('no-api-m').remove()" class="btn-primary" style="flex:1">Получить ключ</button>
    </div>
  </div>`;
  m.addEventListener('click', e=>{ if(e.target===m) m.remove(); });
  document.body.appendChild(m);
}

// ─── AI CHAT ──────────────────────────────────────────────
async function aiChat(system, messages){
  if(!hasAPI()) throw new Error('no-api');
  const r = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ model:MODEL, max_tokens:1000, system, messages })
  });
  const d = await r.json();
  if(!r.ok) throw new Error(d.error?.message || 'API error');
  return d.content?.[0]?.text || '';
}

  d.innerHTML='<div class="msg-bubble">'+text.replace(/\n/g,'<br>')+'</div>';
  area.appendChild(d); area.scrollTop=area.scrollHeight;
}

async function sendNegot(){
  if(negotDone) return;
  const inp=document.getElementById('chat-inp');
  const text=inp.value.trim();
  if(!text) return;
  inp.value=''; inp.style.height='';
  const btn=document.getElementById('send-btn');
  btn.disabled=true;
  const area=document.getElementById('chat-area');
  appendMsg(area,'user',text);
  negotHistory.push({role:'user',content:text});
  showTyping(area);

  try {
    const msgs = negotHistory.slice(-10);
    const reply = await aiChat(
      negotScenario.system+'\n\nОтвечай как клиент, 1-3 предложения. После каждых 3 реплик добавляй в конце: [SCORE:L/P/C] где L=слушание 1-10, P=боль выявлена 1-10, C=к закрытию 1-10',
      msgs
    );
    removeTyping();
    const sc = reply.match(/\[SCORE:(\d+)\/(\d+)\/(\d+)\]/);
    const clean = reply.replace(/\[SCORE:[^\]]+\]/g,'').trim();
    negotHistory.push({role:'assistant',content:clean});
    appendMsg(area,'ai',clean);
    if(sc){
      document.getElementById('sc-l').textContent=sc[1]+'/10';
      document.getElementById('sc-p').textContent=sc[2]+'/10';
      document.getElementById('sc-c').textContent=sc[3]+'/10';
      if(+sc[1]+ +sc[2]+ +sc[3]>=21) addXP(5);
    }
    if(negotHistory.length>=12){
      negotDone=true; S.negotN++; save(); addXP(20);
      appendMsg(area,'system','Сессия завершена! Получи разбор ниже.');

    } else {
      btn.disabled=false;
    }
  } catch(e){
    removeTyping();
    appendMsg(area,'system','Ошибка API. Проверь ключ.');
    btn.disabled=false;
  }
}

function sqlBody(task){
  return `<div class="sql-label">Задача — ${task.title} <span style="color:var(--blue)">[${task.lvl}]</span></div>
  <div class="sql-context">${task.ctx}</div>
  <div class="task-label" style="padding:0 0 6px;font-size:10px">Задание</div>
  <div style="font-size:13px;color:var(--tx);margin-bottom:12px;line-height:1.6">${task.q}</div>
  <div class="task-label" style="padding:0 0 5px;font-size:10px">Подсказка</div>
  <div class="sql-code">${task.hint}</div>
  <textarea class="sql-editor" id="sql-inp" placeholder="Напиши SQL запрос здесь..."></textarea>
  <div class="btn-row">
    <button class="btn-primary" onclick="checkSQL('${task.id}')">Проверить</button>
    <button class="btn-secondary" id="hint-btn" onclick="toggleSQLHint('${task.id}')">Ответ</button>
  </div>
  <div id="sql-result"></div>
  <div id="sql-hint" class="sql-code" style="display:none;margin-top:10px"></div>`;
}

function sqlJump(id){
  const task=SQL_TASKS.find(t=>t.id===id);
  if(task) document.getElementById('sql-body').innerHTML=sqlBody(task);
}

function toggleSQLHint(id){
  const task=SQL_TASKS.find(t=>t.id===id);
  const el=document.getElementById('sql-hint');
  el.style.display=el.style.display==='none'?'block':'none';
  if(el.style.display==='block') el.textContent=task.explain;
}

function checkSQL(id){
  const task=SQL_TASKS.find(t=>t.id===id);
  const ans=(document.getElementById('sql-inp').value||'').toLowerCase().trim();
  if(!ans){ toast('Напиши запрос'); return; }
  const hits=task.keys.filter(k=>ans.includes(k.toLowerCase()));
  const score=hits.length/task.keys.length;
  const res=document.getElementById('sql-result');
  if(score>=0.75){
    res.className='result-block result-ok';
    res.innerHTML='✅ Верно! Все ключевые элементы на месте.';
    if(!S.sqlDone.includes(id)){ S.sqlDone.push(id); save(); addXP(25); }
    setTimeout(()=>{
      const next=SQL_TASKS.find(t=>!S.sqlDone.includes(t.id));
      if(next){ document.getElementById('sql-body').innerHTML=sqlBody(next); toast('Следующая задача!'); }
      else toast('Все задачи пройдены! 🎉');
    },1400);
  } else {
    const missed=task.keys.filter(k=>!ans.includes(k.toLowerCase())).slice(0,3);
    res.className='result-block result-err';
    res.innerHTML='❌ Не хватает: '+missed.map(k=>`<code style="background:var(--bg4);padding:1px 5px;border-radius:3px;font-size:11px">${k}</code>`).join(' ');
  }
}

function econField(id,label,ph){
  return `<div style="margin-bottom:12px">
    <div class="task-label" style="padding:0 0 5px">${label}</div>
    <input id="${id}" type="number" placeholder="${ph}" class="econ-input">
  </div>`;
}

function fillEcon(type){
  const data={raketa:{mrr:4000,cac:0,lt:18,hrs:3,rate:1000},postroy:{mrr:3000,cac:0,lt:12,hrs:2,rate:1000},lesso:{mrr:1500,cac:0,lt:9,hrs:1,rate:1000}};
  const d=data[type];
  Object.keys(d).forEach(k=>{ const el=document.getElementById(k); if(el) el.value=d[k]; });
}

function calcEcon(){
  const v=k=>parseFloat(document.getElementById(k).value)||0;
  const mrr=v('mrr'),cac=v('cac'),lt=v('lt')||12,hrs=v('hrs'),rate=v('rate')||1000;
  const ltv=Math.round(mrr*lt);
  const cost=Math.round(hrs*rate);
  const margin=mrr-cost;
  const marginPct=mrr>0?Math.round(margin/mrr*100):0;
  const ltvCac=cac>0?(ltv/cac).toFixed(1):'∞';
  const payback=cac>0&&margin>0?Math.ceil(cac/margin):0;
  addXP(5);
  document.getElementById('econ-res').innerHTML=`
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-val">${ltv.toLocaleString()}₽</div><div class="stat-label">LTV</div></div>
      <div class="stat-card"><div class="stat-val">${ltvCac}x</div><div class="stat-label">LTV/CAC (норма ≥3)</div></div>
      <div class="stat-card"><div class="stat-val">${margin.toLocaleString()}₽</div><div class="stat-label">Маржа/мес</div></div>
      <div class="stat-card"><div class="stat-val">${marginPct}%</div><div class="stat-label">% маржи (норма 60%+)</div></div>
    </div>
    ${payback>0?`<div style="font-size:13px;color:var(--tx2);margin-top:10px">Окупаемость CAC: <strong style="color:var(--acc)">${payback} мес.</strong></div>`:''}
    <div style="margin-top:10px;font-size:13px;line-height:1.6;color:var(--tx2)">
      ${margin<0?'<span style="color:var(--red)">⚠️ Поддержка дороже подписки — убыточный клиент!</span>':marginPct<50?'<span style="color:var(--amber)">💡 Маржа ниже 60% — рассмотри повышение цены</span>':'<span style="color:var(--green)">✅ Хорошая маржинальность</span>'}
    </div>`;
}

  {q:'PWA стал тормозить — каждый клик перерисовывает всю страницу через innerHTML. Как правильнее?',
   opts:['Перейти на React','Обновлять только нужные DOM-элементы через getElementById','Добавить requestAnimationFrame','Уменьшить CSS'],
   c:1, exp:'Точечное обновление нужных элементов через getElementById/querySelector — правильный подход. innerHTML всей страницы сбрасывает состояние и медленнее. React решит проблему но добавит сложность — для PWA на чистом JS это оверкилл.'}
];

let archIdx=0;

function renderArch(){
  const task=ARCH_LIST[archIdx%ARCH_LIST.length];
  document.getElementById('screen').innerHTML=`<div class="screen-in">
    <div class="prac-header">
      <div class="back-btn" onclick="navigate('home')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="15,18 9,12 15,6"/></svg></div>
      <div class="prac-title-block">
        <div class="module-tag tag-tech">архитектура</div>
        <div class="prac-title">Архитектурные дилеммы</div>
        <div class="prac-subtitle">${archIdx+1}/${ARCH_LIST.length}</div>
      </div>
    </div>
    <div class="review-context">${task.q}</div>
    <div class="review-options" id="arch-opts">
      ${task.opts.map((o,i)=>`<div class="review-opt" id="aopt-${i}" onclick="checkArch(${i},${task.c},'${task.exp.replace(/'/g,"&#39;")}')">${o}</div>`).join('')}
    </div>
    <div id="arch-exp" style="display:none" class="review-explain">${task.exp}</div>
  </div>`;
}

function checkArch(i,correct,exp){
  document.querySelectorAll('.review-opt').forEach((el,idx)=>{
    el.onclick=null;
    if(idx===correct) el.className='review-opt correct';
    else if(idx===i) el.className='review-opt wrong';
  });
  const expEl=document.getElementById('arch-exp');
  expEl.style.display='block'; expEl.textContent=exp;
  if(i===correct){ addXP(15); }
  archIdx++;
  setTimeout(renderArch, 2500);
}

// ─── GIT ──────────────────────────────────────────────────
const GIT_LIST=[
  {title:'Сломал прод — откатись',
   ctx:'Ты запушил изменения и сайт упал. Пользователи видят ошибку. Расставь шаги в правильном порядке:',
   steps:['git log --oneline','Найти хеш последнего рабочего коммита','git revert <hash>','git push origin main']},
  {title:'Фича без риска для прода',
   ctx:'Нужно добавить систему лояльности не ломая рабочую версию. Правильный порядок:',
   steps:['git checkout -b feature/loyalty','Разработка и коммиты изменений','git checkout main','git merge feature/loyalty']},
  {title:'Срочный hotfix в прод',
   ctx:'На main есть незавершённая фича. Нужно срочно исправить баг в проде. Порядок действий:',
   steps:['git stash','git checkout main','Исправить баг и сделать коммит','git push origin main','git stash pop']}
];

let gitTask=null, gitSelected=[], gitDone=false;

function renderGit(){
  gitTask=GIT_LIST[Math.floor(Math.random()*GIT_LIST.length)];
  gitSelected=[]; gitDone=false;
  const shuffled=[...gitTask.steps].sort(()=>Math.random()-0.5);
  gitTask._shuffled=shuffled;
  document.getElementById('screen').innerHTML=`<div class="screen-in">
    <div class="prac-header">
      <div class="back-btn" onclick="navigate('home')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="15,18 9,12 15,6"/></svg></div>
      <div class="prac-title-block">
        <div class="module-tag tag-tech">git</div>
        <div class="prac-title">${gitTask.title}</div>
      </div>
    </div>
    <div class="review-context">${gitTask.ctx}</div>
    <div style="padding:0 16px 12px;font-size:12px;color:var(--tx3)">Нажимай шаги в правильном порядке:</div>
    <div style="padding:0 16px" id="git-steps">
      ${shuffled.map((s,i)=>`<div class="git-step" id="gs-${i}" onclick="selectGit(${i})">${s}</div>`).join('')}
    </div>
    <div style="padding:0 16px 20px" id="git-result"></div>
  </div>`;
}

function selectGit(i){
  if(gitDone) return;
  if(gitSelected.includes(i)) return;
  gitSelected.push(i);
  const el=document.getElementById('gs-'+i);
  el.className='git-step sel';
  el.innerHTML=`<span style="color:var(--tx3);font-size:10px">#${gitSelected.length} </span>${gitTask._shuffled[i]}`;

  if(gitSelected.length===gitTask.steps.length){
    gitDone=true;
    const correct=gitSelected.every((val,idx)=>gitTask._shuffled[val]===gitTask.steps[idx]);
    gitSelected.forEach((val,idx)=>{
      const el=document.getElementById('gs-'+val);
      el.className='git-step '+(gitTask._shuffled[val]===gitTask.steps[idx]?'correct':'wrong');
    });
    const res=document.getElementById('git-result');
    if(correct){
      res.innerHTML='<div class="result-block result-ok">✅ Верно! +15 XP</div>';
      addXP(15);
    } else {
      res.innerHTML=`<div class="result-block result-err">❌ Не совсем. Правильный порядок:<br>${gitTask.steps.map((s,i)=>`${i+1}. <code style="font-size:11px">${s}</code>`).join('<br>')}</div>`;
    }
    res.innerHTML+=`<button class="btn-primary" style="margin-top:10px" onclick="navigate('git')">Ещё сценарий</button>`;
  }
}

// ─── CHAT KEY ─────────────────────────────────────────────
function chatKey(e,type){
  if(e.key==='Enter'&&!e.shiftKey){
    e.preventDefault();
    if(type==='negot') sendNegot();
    else if(type==='cdev') sendCdev();
  }
  autoResize(e.target);
}

// ─── SW ───────────────────────────────────────────────────
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').then(reg=>{
    reg.update();
    reg.addEventListener('updatefound',()=>{
      const w=reg.installing;
      w.addEventListener('statechange',()=>{
        if(w.state==='installed'&&navigator.serviceWorker.controller)
          document.getElementById('update-banner').style.display='block';
      });
    });
  });
  navigator.serviceWorker.addEventListener('controllerchange',()=>location.reload());
}

// ─── START ────────────────────────────────────────────────
navigate('home', false);
