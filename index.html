<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d0d0d">
<title>Тренажёр фаундера</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d0d;
  --bg2: #161616;
  --bg3: #1e1e1e;
  --bg4: #242424;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --tx: #f0ede8;
  --tx2: #a09a92;
  --tx3: #6b6560;
  --acc: #e8d5a3;
  --acc2: #c4a96e;
  --acc3: #8b6f3e;
  --blue: #5b9bd5;
  --blue2: #3d7ab8;
  --green: #5dba8a;
  --red: #d96b5a;
  --purple: #9b7fd4;
  --font-h: 'Unbounded', sans-serif;
  --font: 'Golos Text', sans-serif;
  --r: 14px;
  --r2: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--tx); font-family: var(--font); overflow: hidden; }

/* APP SHELL */
#app { display: flex; flex-direction: column; height: 100vh; max-width: 430px; margin: 0 auto; position: relative; }
#screen { flex: 1; overflow-y: auto; overflow-x: hidden; scroll-behavior: smooth; }
#screen::-webkit-scrollbar { display: none; }

/* UPDATE BANNER */
#update-banner { display: none; position: fixed; top: 0; left: 50%; transform: translateX(-50%); background: var(--acc); color: #1a1200; font-size: 13px; font-weight: 600; padding: 10px 20px; border-radius: 0 0 var(--r2) var(--r2); z-index: 999; cursor: pointer; max-width: 430px; width: 100%; text-align: center; }

/* NAV */
#nav { display: grid; grid-template-columns: repeat(3, 1fr); border-top: 1px solid var(--border); background: var(--bg2); flex-shrink: 0; }
.nav-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 10px 4px 14px; cursor: pointer; border: none; background: none; color: var(--tx3); font-family: var(--font); font-size: 10px; transition: color 0.2s; }
.nav-btn svg { width: 22px; height: 22px; stroke-width: 1.8; }
.nav-btn.active { color: var(--acc); }
.nav-btn span { font-family: var(--font); }

/* HOME SCREEN */
.home-header { padding: 48px 20px 24px; }
.home-brand { font-family: var(--font-h); font-size: 11px; color: var(--acc2); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 12px; }
.home-title { font-family: var(--font-h); font-size: 22px; font-weight: 700; color: var(--tx); line-height: 1.25; }
.home-title span { color: var(--acc); }
.home-sub { font-size: 13px; color: var(--tx2); margin-top: 10px; line-height: 1.6; }

.streak-row { margin: 0 20px 24px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--r); padding: 16px; display: flex; align-items: center; gap: 16px; }
.streak-icon { font-size: 28px; }
.streak-val { font-family: var(--font-h); font-size: 24px; font-weight: 700; color: var(--acc); }
.streak-label { font-size: 11px; color: var(--tx3); margin-top: 2px; }
.streak-bar { flex: 1; }
.xp-row { display: flex; justify-content: space-between; font-size: 11px; color: var(--tx3); margin-bottom: 6px; }
.xp-track { height: 4px; background: var(--bg4); border-radius: 2px; overflow: hidden; }
.xp-fill { height: 100%; background: linear-gradient(90deg, var(--acc3), var(--acc)); border-radius: 2px; transition: width 0.5s ease; }

.section-title { font-size: 11px; font-weight: 600; color: var(--tx3); letter-spacing: 0.12em; text-transform: uppercase; padding: 0 20px 12px; }

.modules-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 20px 24px; }
.module-card { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--r); padding: 16px; cursor: pointer; transition: border-color 0.2s, background 0.2s; position: relative; overflow: hidden; }
.module-card:active { background: var(--bg4); }
.module-card.locked { opacity: 0.4; cursor: default; }
.module-tag { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; padding: 3px 8px; border-radius: 20px; display: inline-block; }
.tag-biz { background: rgba(155,127,212,0.15); color: var(--purple); }
.tag-tech { background: rgba(91,155,213,0.15); color: var(--blue); }
.module-icon { font-size: 24px; margin-bottom: 8px; }
.module-name { font-size: 13px; font-weight: 600; color: var(--tx); line-height: 1.3; margin-bottom: 4px; }
.module-desc { font-size: 11px; color: var(--tx3); line-height: 1.5; }
.module-badge { position: absolute; top: 12px; right: 12px; font-size: 10px; background: var(--green); color: #003320; padding: 2px 7px; border-radius: 20px; font-weight: 600; }
.module-badge.soon { background: var(--bg4); color: var(--tx3); }

/* PRACTICE SCREEN */
.prac-header { padding: 48px 20px 20px; display: flex; align-items: flex-start; gap: 14px; }
.back-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--bg3); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; margin-top: 2px; }
.back-btn svg { width: 18px; height: 18px; color: var(--tx2); }
.prac-title-block .module-tag { margin-bottom: 6px; }
.prac-title { font-family: var(--font-h); font-size: 16px; font-weight: 700; color: var(--tx); }
.prac-subtitle { font-size: 12px; color: var(--tx2); margin-top: 4px; }

/* CHAT */
.chat-area { padding: 0 16px 16px; display: flex; flex-direction: column; gap: 12px; min-height: 200px; }
.msg { max-width: 85%; animation: fadeUp 0.3s ease; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.msg.ai { align-self: flex-start; }
.msg.user { align-self: flex-end; }
.msg-bubble { padding: 12px 16px; border-radius: var(--r); font-size: 14px; line-height: 1.6; }
.msg.ai .msg-bubble { background: var(--bg3); border: 1px solid var(--border); color: var(--tx); border-bottom-left-radius: 4px; }
.msg.user .msg-bubble { background: var(--acc3); color: var(--tx); border-bottom-right-radius: 4px; }
.msg.system .msg-bubble { background: rgba(93,186,138,0.1); border: 1px solid rgba(93,186,138,0.2); color: var(--green); font-size: 12px; align-self: center; max-width: 90%; text-align: center; }
.msg.system { align-self: center; max-width: 90%; }
.typing-dots { display: flex; gap: 5px; padding: 14px 16px; }
.typing-dots span { width: 7px; height: 7px; background: var(--tx3); border-radius: 50%; animation: blink 1.2s infinite; }
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%,80%,100% { opacity: 0.3; } 40% { opacity: 1; } }

.chat-input-row { padding: 12px 16px; display: flex; gap: 10px; border-top: 1px solid var(--border); background: var(--bg2); flex-shrink: 0; }
.chat-input { flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--r2); padding: 10px 14px; color: var(--tx); font-family: var(--font); font-size: 14px; resize: none; min-height: 42px; max-height: 120px; line-height: 1.4; }
.chat-input:focus { outline: none; border-color: var(--border2); }
.chat-input::placeholder { color: var(--tx3); }
.send-btn { width: 42px; height: 42px; border-radius: var(--r2); background: var(--acc); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity 0.2s; }
.send-btn:disabled { opacity: 0.4; cursor: default; }
.send-btn svg { width: 18px; height: 18px; color: #1a1200; }

/* TASK CARD */
.task-card { margin: 0 16px 16px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--r); padding: 16px; }
.task-label { font-size: 10px; font-weight: 600; color: var(--tx3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
.task-text { font-size: 14px; color: var(--tx); line-height: 1.6; }
.task-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.chip { font-size: 11px; padding: 4px 10px; border-radius: 20px; background: var(--bg4); border: 1px solid var(--border); color: var(--tx2); }

/* SQL MODULE */
.sql-task { margin: 0 16px 16px; }
.sql-label { font-size: 10px; font-weight: 600; color: var(--blue); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
.sql-context { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--r2); padding: 14px; font-size: 13px; color: var(--tx); line-height: 1.6; margin-bottom: 10px; }
.sql-code { background: #0d1117; border: 1px solid var(--border); border-radius: var(--r2); padding: 14px; font-family: 'Courier New', monospace; font-size: 12px; color: #e2c08d; line-height: 1.7; white-space: pre-wrap; word-break: break-all; }
.sql-editor { width: 100%; background: #0d1117; border: 1px solid var(--border2); border-radius: var(--r2); padding: 14px; font-family: 'Courier New', monospace; font-size: 13px; color: #e2c08d; line-height: 1.7; min-height: 100px; resize: vertical; margin-bottom: 10px; }
.sql-editor:focus { outline: none; border-color: var(--blue2); }
.sql-editor::placeholder { color: var(--tx3); font-family: var(--font); font-size: 12px; }
.btn-row { display: flex; gap: 8px; }
.btn-primary { flex: 1; background: var(--acc); color: #1a1200; border: none; border-radius: var(--r2); padding: 12px; font-family: var(--font); font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
.btn-primary:disabled { opacity: 0.4; cursor: default; }
.btn-secondary { background: var(--bg3); color: var(--tx2); border: 1px solid var(--border); border-radius: var(--r2); padding: 12px 16px; font-family: var(--font); font-size: 13px; cursor: pointer; }
.result-block { margin-top: 10px; padding: 12px 14px; border-radius: var(--r2); font-size: 13px; line-height: 1.6; }
.result-ok { background: rgba(93,186,138,0.1); border: 1px solid rgba(93,186,138,0.25); color: var(--green); }
.result-err { background: rgba(217,107,90,0.1); border: 1px solid rgba(217,107,90,0.25); color: var(--red); }
.level-row { display: flex; gap: 8px; padding: 0 16px 16px; overflow-x: auto; padding-bottom: 16px; }
.level-row::-webkit-scrollbar { display: none; }
.level-pill { flex-shrink: 0; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: var(--bg3); color: var(--tx2); transition: all 0.2s; }
.level-pill.active { background: var(--blue2); border-color: var(--blue2); color: #fff; }
.level-pill.done { background: rgba(93,186,138,0.15); border-color: rgba(93,186,138,0.3); color: var(--green); }

/* CODE REVIEW */
.code-snippet { background: #0d1117; border: 1px solid var(--border); border-radius: var(--r2); padding: 16px; margin: 0 16px 12px; font-family: 'Courier New', monospace; font-size: 12px; line-height: 1.8; color: #cdd9e5; overflow-x: auto; }
.code-snippet .err { color: var(--red); text-decoration: wavy underline var(--red); }
.code-snippet .warn { color: #e8c56d; }
.bug-hunt { padding: 0 16px 12px; }
.bug-item { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--r2); padding: 14px; margin-bottom: 8px; cursor: pointer; transition: border-color 0.2s; }
.bug-item:hover { border-color: var(--border2); }
.bug-item.selected-ok { border-color: var(--green); background: rgba(93,186,138,0.07); }
.bug-item.selected-err { border-color: var(--red); background: rgba(217,107,90,0.07); }
.bug-q { font-size: 13px; color: var(--tx); margin-bottom: 4px; }
.bug-hint { font-size: 11px; color: var(--tx3); }

/* STATS SCREEN */
.stats-screen { padding: 48px 20px 24px; }
.stats-title { font-family: var(--font-h); font-size: 18px; font-weight: 700; margin-bottom: 24px; }
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
.stat-card { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--r); padding: 16px; }
.stat-val { font-family: var(--font-h); font-size: 26px; font-weight: 700; color: var(--acc); }
.stat-label { font-size: 11px; color: var(--tx3); margin-top: 4px; }
.history-item { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--r2); padding: 12px 14px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
.hist-name { font-size: 13px; color: var(--tx); }
.hist-time { font-size: 11px; color: var(--tx3); }
.hist-score { font-size: 12px; font-weight: 600; color: var(--green); }

/* REVIEW MODULE */
.review-context { margin: 0 16px 12px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--r); padding: 16px; font-size: 13px; color: var(--tx); line-height: 1.7; }
.review-options { padding: 0 16px 12px; }
.review-opt { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--r2); padding: 12px 14px; margin-bottom: 8px; cursor: pointer; font-size: 13px; color: var(--tx); line-height: 1.5; transition: border-color 0.2s; }
.review-opt:hover { border-color: var(--border2); }
.review-opt.correct { border-color: var(--green); background: rgba(93,186,138,0.07); color: var(--green); }
.review-opt.wrong { border-color: var(--red); background: rgba(217,107,90,0.07); color: var(--red); }
.review-explanation { margin: 0 16px 12px; background: rgba(93,186,138,0.08); border: 1px solid rgba(93,186,138,0.2); border-radius: var(--r2); padding: 14px; font-size: 13px; color: var(--tx2); line-height: 1.6; display: none; }

/* TOAST */
#toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--bg3); border: 1px solid var(--border2); color: var(--tx); font-size: 13px; padding: 10px 20px; border-radius: 100px; opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; z-index: 100; }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* NEGOT MODULE specific */
.scenario-card { margin: 0 16px 16px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--r); padding: 16px; }
.scenario-avatar { width: 48px; height: 48px; border-radius: 50%; background: var(--bg4); display: flex; align-items: center; justify-content: center; font-size: 20px; margin-bottom: 10px; border: 1px solid var(--border); }
.scenario-name { font-size: 14px; font-weight: 600; color: var(--tx); }
.scenario-role { font-size: 12px; color: var(--tx3); margin-top: 2px; }
.scenario-goal { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); font-size: 12px; color: var(--tx2); line-height: 1.5; }
.score-row { display: flex; gap: 8px; margin-top: 10px; }
.score-chip { flex: 1; background: var(--bg4); border-radius: var(--r2); padding: 8px; text-align: center; }
.score-chip-val { font-family: var(--font-h); font-size: 16px; font-weight: 700; color: var(--acc); }
.score-chip-label { font-size: 10px; color: var(--tx3); margin-top: 2px; }

/* Animations */
.screen-in { animation: screenIn 0.25s ease; }
@keyframes screenIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
.screen-out { animation: screenOut 0.2s ease forwards; }
@keyframes screenOut { to { opacity: 0; transform: translateX(-20px); } }
</style>
</head>
<body>
<div id="update-banner" onclick="location.reload()">🔄 Обновление доступно — нажми для установки</div>
<div id="app">
  <div id="screen"></div>
  <nav id="nav">
    <button class="nav-btn active" onclick="goHome()" id="nav-home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
      <span>Модули</span>
    </button>
    <button class="nav-btn" onclick="goPractice()" id="nav-practice">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
      <span>Практика</span>
    </button>
    <button class="nav-btn" onclick="goStats()" id="nav-stats">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span>Прогресс</span>
    </button>
  </nav>
</div>
<div id="toast"></div>

<script>
const API_KEY = 'YOUR_API_KEY';
const MODEL = 'claude-sonnet-4-20250514';

function hasAPI() { return API_KEY && API_KEY !== 'YOUR_API_KEY'; }

function showNoAPI() {
  const existing = document.getElementById('no-api-modal');
  if (existing) existing.remove();
  const m = document.createElement('div');
  m.id = 'no-api-modal';
  m.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px';
  m.innerHTML = `
    <div style="background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:24px;max-width:320px;width:100%">
      <div style="font-size:28px;margin-bottom:12px">🔑</div>
      <div style="font-family:var(--font-h);font-size:16px;font-weight:700;color:var(--tx);margin-bottom:8px">Нужен API ключ</div>
      <div style="font-size:13px;color:var(--tx2);line-height:1.6;margin-bottom:16px">Этот модуль работает через Claude AI. Нужен ключ от Anthropic — стоит ~200₽/мес при ежедневном использовании.</div>
      <div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:12px;margin-bottom:16px">
        <div style="font-size:10px;color:var(--tx3);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.1em">Как получить</div>
        <div style="font-size:12px;color:var(--tx2);line-height:1.8">1. Открой console.anthropic.com<br>2. API Keys → Create Key<br>3. Вставь в index.html строку:<br><code style="color:var(--acc);font-size:11px">const API_KEY = 'sk-ant-...'</code></div>
      </div>
      <div style="display:flex;gap:8px">
        <button onclick="document.getElementById('no-api-modal').remove()" style="flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:10px;color:var(--tx2);font-family:var(--font);font-size:13px;cursor:pointer">Закрыть</button>
        <button onclick="openLink('https://console.anthropic.com')" style="flex:1;background:var(--acc);border:none;border-radius:var(--r2);padding:10px;color:#1a1200;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer">Получить ключ</button>
      </div>
    </div>`;
  document.body.appendChild(m);
  m.addEventListener('click', e => { if (e.target === m) m.remove(); });
}

let S = JSON.parse(localStorage.getItem('tf_state') || '{}');
S.streak = S.streak || 0;
S.xp = S.xp || 0;
S.history = S.history || [];
S.sqlDone = S.sqlDone || [];
S.reviewDone = S.reviewDone || 0;
S.lastDate = S.lastDate || '';
S.negotSessions = S.negotSessions || 0;
S.cdevSessions = S.cdevSessions || 0;

function save() { localStorage.setItem('tf_state', JSON.stringify(S)); }

function addXP(n) {
  S.xp += n;
  save();
  toast(`+${n} XP`);
}

function checkStreak() {
  const today = new Date().toDateString();
  if (S.lastDate !== today) {
    const yesterday = new Date(Date.now() - 86400000).toDateString();
    if (S.lastDate === yesterday) S.streak++;
    else if (S.lastDate !== today) S.streak = 1;
    S.lastDate = today;
    save();
  }
}
checkStreak();

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function setNav(id) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ===== HOME ===== */
function goHome() {
  setNav('nav-home');
  const xpLevel = Math.floor(S.xp / 100);
  const xpPct = (S.xp % 100);
  document.getElementById('screen').innerHTML = `
    <div class="screen-in">
      <div class="home-header">
        <div class="home-brand">Nizamov.tech</div>
        <div class="home-title">Тренажёр<br><span>фаундера</span></div>
        <div class="home-sub">Бизнес и технические навыки через живую практику</div>
      </div>
      <div class="streak-row">
        <div class="streak-icon">🔥</div>
        <div>
          <div class="streak-val">${S.streak}</div>
          <div class="streak-label">дней подряд</div>
        </div>
        <div class="streak-bar">
          <div class="xp-row"><span>Уровень ${xpLevel}</span><span>${S.xp} XP</span></div>
          <div class="xp-track"><div class="xp-fill" style="width:${xpPct}%"></div></div>
        </div>
      </div>
      <div class="section-title">Бизнес</div>
      <div class="modules-grid">
        <div class="module-card" onclick="openNegot()">
          <div class="module-tag tag-biz">переговоры</div>

/* ===== AI CHAT ENGINE ===== */
async function aiChat(systemPrompt, messages, onChunk) {
  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: MODEL,
      max_tokens: 1000,
      system: systemPrompt,
      messages: messages
    })
  });
  const data = await resp.json();
  return data.content?.[0]?.text || 'Ошибка ответа';
}

function showTyping(chatArea) {
  const d = document.createElement('div');
  d.className = 'msg ai'; d.id = 'typing';
  d.innerHTML = '<div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
  chatArea.appendChild(d);
  chatArea.scrollTop = chatArea.scrollHeight;
}
function removeTyping() { document.getElementById('typing')?.remove(); }

function appendMsg(chatArea, role, text) {
  const d = document.createElement('div');
  d.className = `msg ${role}`;
  d.innerHTML = `<div class="msg-bubble">${text.replace(/\n/g,'<br>')}</div>`;
  chatArea.appendChild(d);
  chatArea.scrollTop = chatArea.scrollHeight;
}

async function sendNegot() {
  if (!negotStarted) return;
  const inp = document.getElementById('chat-inp');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  inp.style.height = '';
  const btn = document.getElementById('send-btn');
  btn.disabled = true;

  const chatArea = document.getElementById('chat-area');
  appendMsg(chatArea, 'user', text);
  negotHistory.push({ role: 'user', content: text });
  showTyping(chatArea);

  const reply = await aiChat(currentScenario.system + `\n\nИстория диалога выше. Отвечай как клиент, 1-3 предложения. После 6+ обменов — можешь начать склоняться к сделке если продавец хорошо выявил боли. Каждые 3 реплики добавляй в конце ответа в формате [ОЦЕНКА:слушание/10,боль/10,закрытие/10] — числа от 1 до 10 без пробелов.`, negotHistory);

  removeTyping();
  const scoreMatch = reply.match(/\[ОЦЕНКА:(\d+)\/10,(\d+)\/10,(\d+)\/10\]/);
  let cleanReply = reply.replace(/\[ОЦЕНКА:[^\]]+\]/g, '').trim();

  negotHistory.push({ role: 'assistant', content: cleanReply });
  appendMsg(chatArea, 'ai', cleanReply);

  if (scoreMatch) {
    document.getElementById('sc-listen').textContent = scoreMatch[1]+'/10';
    document.getElementById('sc-pain').textContent = scoreMatch[2]+'/10';
    document.getElementById('sc-close').textContent = scoreMatch[3]+'/10';
    const total = parseInt(scoreMatch[1]) + parseInt(scoreMatch[2]) + parseInt(scoreMatch[3]);
    if (total >= 21) addXP(15);
  }

  if (negotHistory.length >= 12) {
    S.negotSessions++;
    save();
    addXP(20);
    appendMsg(chatArea, 'system', 'Сессия завершена! Получи разбор ошибок ⬇️');
    const debriefBtn = document.createElement('div');
    debriefBtn.style.cssText = 'padding:0 16px 16px';
    debriefBtn.innerHTML = `<button class="btn-primary" onclick="getNegotDebrief()">Разбор ошибок и рекомендации</button>`;
    document.getElementById('screen').querySelector('.screen-in').appendChild(debriefBtn);
    btn.disabled = true;
  } else {
    btn.disabled = false;
  }
}

function checkSQL() {
  const answer = document.getElementById('sql-inp').value.toLowerCase().trim();
  if (!answer) return;
  const task = currentSQL;
  const hits = task.check_keywords.filter(k => answer.includes(k.toLowerCase()));
  const score = hits.length / task.check_keywords.length;
  const result = document.getElementById('sql-result');

  if (score >= 0.8) {
    result.className = 'result-block result-ok';
    result.innerHTML = `✅ Верно! (совпало ${hits.length}/${task.check_keywords.length} ключевых элементов)`;
    if (!S.sqlDone.includes(task.id)) {
      S.sqlDone.push(task.id);
      save();
      addXP(25);
    }
    setTimeout(() => {
      const next = SQL_TASKS.find(t => !S.sqlDone.includes(t.id));
      if (next) {
        currentSQL = next;
        renderSQLScreen();
        toast('Следующая задача!');
      } else {
        toast('Все задачи пройдены! 🎉');
      }
    }, 1500);
  } else {
    result.className = 'result-block result-err';
    result.innerHTML = `❌ Не совсем. Нашёл ${hits.length}/${task.check_keywords.length} элементов. Проверь: ${task.check_keywords.filter(k=>!answer.includes(k)).slice(0,3).map(k=>`<code style="background:var(--bg4);padding:1px 5px;border-radius:3px">${k}</code>`).join(', ')}`;
  }
}

function showSQLHint() {
  const el = document.getElementById('sql-explain');
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
  el.textContent = currentSQL.explanation;
}

function fillEcon(type) {
  if (type === 'raketa') {
    document.getElementById('mrr1').value = 4000;
    document.getElementById('cac1').value = 0;
    document.getElementById('lt1').value = 18;
    document.getElementById('hrs1').value = 3;
    document.getElementById('rate1').value = 1000;
  } else if (type === 'postroy') {
    document.getElementById('mrr1').value = 3000;
    document.getElementById('cac1').value = 0;
    document.getElementById('lt1').value = 12;
    document.getElementById('hrs1').value = 2;
    document.getElementById('rate1').value = 1000;
  }
}

function calcEcon() {
  const mrr = parseFloat(document.getElementById('mrr1').value) || 0;
  const cac = parseFloat(document.getElementById('cac1').value) || 0;
  const lt = parseFloat(document.getElementById('lt1').value) || 12;
  const hrs = parseFloat(document.getElementById('hrs1').value) || 0;
  const rate = parseFloat(document.getElementById('rate1').value) || 1000;

  const ltv = mrr * lt;
  const supportCost = hrs * rate;
  const margin = mrr - supportCost;
  const ltv_cac = cac > 0 ? (ltv / cac).toFixed(1) : '∞';
  const payback = cac > 0 ? Math.ceil(cac / margin) : 0;
  const marginPct = mrr > 0 ? Math.round((margin / mrr) * 100) : 0;

  document.getElementById('econ-result').innerHTML = `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-val">${ltv.toLocaleString()}₽</div><div class="stat-label">LTV (жизненная ценность)</div></div>
      <div class="stat-card"><div class="stat-val">${ltv_cac}x</div><div class="stat-label">LTV/CAC (норма ≥3)</div></div>
      <div class="stat-card"><div class="stat-val">${margin.toLocaleString()}₽</div><div class="stat-label">Маржа в месяц</div></div>
      <div class="stat-card"><div class="stat-val">${marginPct}%</div><div class="stat-label">% маржи (норма 60%+)</div></div>
    </div>
    ${payback > 0 ? `<div style="font-size:13px;color:var(--tx2);margin-top:8px">Окупаемость привлечения: <strong style="color:var(--acc)">${payback} мес.</strong></div>` : ''}
    ${margin < 0 ? '<div style="font-size:13px;color:var(--red);margin-top:8px">⚠️ Поддержка дороже подписки — убыточный клиент!</div>' : ''}
    ${marginPct < 50 ? '<div style="font-size:13px;color:var(--acc2);margin-top:8px">💡 Маржа ниже 60% — повысь цену или сократи поддержку</div>' : '<div style="font-size:13px;color:var(--green);margin-top:8px">✅ Хорошая маржинальность</div>'}`;
  addXP(5);
}

        <div class="back-btn" onclick="goHome()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="15,18 9,12 15,6"/></svg></div>
        <div class="prac-title-block">
          <div class="module-tag tag-tech">архитектура</div>
          <div class="prac-title">Архитектурные дилеммы</div>
        </div>
      </div>
      <div class="review-context">${c.q}</div>
      <div class="review-options">
        ${c.opts.map((o,i) => `<div class="review-opt" id="arch-${i}" onclick="checkArch(${i},${c.correct},'${c.explain.replace(/'/g,"&#39;")}')">${o}</div>`).join('')}
      </div>
      <div class="review-explanation" id="arch-explain">${c.explain}</div>
    </div>`;
}

function checkArch(i, correct, explain) {
  document.querySelectorAll('.review-opt').forEach((el,idx) => {
    el.onclick = null;
    if (idx === correct) el.className = 'review-opt correct';
    else if (idx === i && i !== correct) el.className = 'review-opt wrong';
  });
  const exp = document.getElementById('arch-explain');
  exp.style.display = 'block';
  exp.textContent = explain;
  if (i === correct) addXP(15);
  setTimeout(openArch, 3000);
}

/* ===== GIT ===== */
function openGit() {
  setNav('nav-practice');
  const scenarios = [
    { title: 'Сломал прод случайно', steps: ['git log --oneline', 'Найти хеш последнего рабочего коммита', 'git revert <hash>', 'git push origin main'], context: 'Ты запушил изменение и сайт упал. Пользователи видят ошибку. Что делать в правильном порядке?' },
    { title: 'Работа над фичей без риска', steps: ['git checkout -b feature/loyalty', 'Разрабатываешь и коммитишь изменения', 'git checkout main', 'git merge feature/loyalty'], context: 'Тебе нужно добавить систему лояльности в проект, не ломая рабочую версию. Правильный порядок действий:' }
  ];
  const s = scenarios[Math.floor(Math.random() * scenarios.length)];
  let order = [...s.steps].sort(() => Math.random() - 0.5);
  let selected = [];

  function render() {
    document.getElementById('screen').innerHTML = `
      <div class="screen-in">
        <div class="prac-header">
          <div class="back-btn" onclick="goHome()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="15,18 9,12 15,6"/></svg></div>
          <div class="prac-title-block">
            <div class="module-tag tag-tech">git</div>
            <div class="prac-title">${s.title}</div>
          </div>
        </div>
        <div class="review-context">${s.context}</div>
        <div style="padding:0 16px">
          <div class="task-label" style="padding:0 0 8px">Нажимай шаги в правильном порядке:</div>
          ${order.map((step, i) => `
            <div id="git-${i}" onclick="selectGit(${i})" style="background:var(--bg3);border:1px solid ${selected.includes(i)?'var(--acc2)':'var(--border)'};border-radius:var(--r2);padding:11px 14px;margin-bottom:8px;cursor:pointer;font-family:'Courier New',monospace;font-size:12px;color:${selected.includes(i)?'var(--acc)':'var(--tx)'};transition:all 0.2s">
              ${selected.includes(i)?`<span style="color:var(--tx3);font-size:10px">#${selected.indexOf(i)+1} </span>`:''}${step}
            </div>`).join('')}
          <div id="git-result" style="margin-top:10px"></div>
        </div>
      </div>`;
  }

  window.selectGit = function(i) {
    if (selected.includes(i)) return;
    selected.push(i);
    if (selected.length === s.steps.length) {
      const correct = selected.every((val, idx) => order[val] === s.steps[idx]);
      document.getElementById('git-result').innerHTML = correct
        ? `<div class="result-block result-ok">✅ Верно! +15 XP</div>`
        : `<div class="result-block result-err">❌ Не совсем. Правильный порядок:<br>${s.steps.map((st,i)=>`${i+1}. <code>${st}</code>`).join('<br>')}</div>`;
      if (correct) addXP(15);
      setTimeout(openGit, 2500);
    } else {
      render();
    }
  };
  render();
}

function handleKey(e, type) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (type === 'negot') sendNegot();
    else if (type === 'cdev') sendCdev();
  }
  const ta = e.target;
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
}

// SW
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(reg => {
    reg.update();
    reg.addEventListener('updatefound', () => {
      const w = reg.installing;
      w.addEventListener('statechange', () => {
        if (w.state === 'installed' && navigator.serviceWorker.controller) {
          document.getElementById('update-banner').style.display = 'block';
        }
      });
    });
  });
  navigator.serviceWorker.addEventListener('controllerchange', () => location.reload());
}
